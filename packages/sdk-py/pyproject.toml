[project]
name = "lattice-sdk"
version = "0.0.0"
description = "Lattice Python SDK — shared client for api + cli"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lattice_sdk"]
