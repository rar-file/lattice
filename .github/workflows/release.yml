name: Release

# Trigger:
#   * push a tag like `v0.1.0` → builds and publishes a GitHub release
#     containing .dmg (macOS Apple Silicon + Intel) and .msi (Windows x86_64).
#   * `workflow_dispatch` lets us dry-run from the Actions UI without tagging;
#     the artifacts are uploaded to the run but no release is created.
#
# Per platform the job:
#   1. Sets up Python + uv, installs deps, builds the PyInstaller sidecar
#      under `apps/desktop/src-tauri/binaries/lattice-api-<target-triple>`.
#   2. Sets up Node + pnpm, builds the Next.js static export.
#   3. Runs `tauri build` which packages the sidecar + frontend into a
#      native installer (.dmg / .msi / .deb-or-AppImage).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.target }})
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.11"

      - name: Install Python deps (incl. PyInstaller)
        run: uv sync --all-packages

      - name: Build PyInstaller sidecar
        run: uv run python apps/desktop/src-tauri/build_sidecar.py ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        run: pnpm --filter @lattice/web build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # `__VERSION__` is replaced by the tag (e.g. v0.1.0) by tauri-action.
          tagName: ${{ github.ref_name }}
          releaseName: "Lattice ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: apps/desktop

      - name: Upload installers as workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore
