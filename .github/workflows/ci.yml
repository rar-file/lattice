name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.11"
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Typecheck
        run: uv run pyright
      - name: Test
        run: uv run pytest -v

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm exec biome check .
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build (web + sdk)
        # Skip @lattice/desktop — tauri build needs GTK system libs +
        # the PyInstaller sidecar binary, both of which only exist
        # inside the dedicated release workflow. Call turbo directly
        # with its own filter; `pnpm -r build` invokes the root's
        # `turbo run build` and would re-include desktop.
        run: pnpm exec turbo run build --filter='!@lattice/desktop'
